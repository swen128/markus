name: Verify PR

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  verify:
    if: github.event.pull_request.user.login == github.repository_owner || github.event.pull_request.user.login == 'claude[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Skip if already verified this SHA
        run: |
          existing=$(gh api "repos/${{ github.repository }}/actions/workflows/verify-pr.yml/runs?head_sha=${{ github.event.pull_request.head.sha }}&status=success" --jq '.workflow_runs[0].id')
          if [[ -n "$existing" && "$existing" != "null" ]]; then
            echo "Already verified in run $existing"
            exit 78
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
      - run: sudo apt-get install -y tmux
      - run: bun install --frozen-lockfile

      - name: Verify PR
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--agent ci-verifier --dangerously-skip-permissions"
          prompt: "Verify PR #${{ github.event.pull_request.number }}"
