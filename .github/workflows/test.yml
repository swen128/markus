name: Test

on:
  push:
    branches: [main]
    paths:
      - src/**
      - skills/**
      - templates/**
      - hooks/**
      - tests/**
      - package.json
      - bun.lock
      - .github/workflows/test.yml
      - .claude/agents/tester.md
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Run tester agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--agent tester --dangerously-skip-permissions"
          prompt: "Run all test scenarios in tests/scenarios/ and file GitHub issues for any failures."
