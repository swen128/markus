name: Propose Solution

on:
  issues:
    types: [opened, labeled]

jobs:
  propose:
    if: (github.event.sender.login == github.repository_owner || github.event.sender.login == 'github-actions[bot]') && (github.event.label.name == 'status:new' || (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'status:new')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Propose solution
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--agent proposer --dangerously-skip-permissions"
          prompt: "Propose solutions for issue #${{ github.event.issue.number }}"
